<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.svg" />
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CourtPass — Clubs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --lime: #BFEF45;
      --dark: #0D1A0F;
      --surface: #132015;
      --surface2: #0F1C12;
      --border: #1E3022;
      --muted: #3A5040;
      --text: #E8F0E9;
      --text2: #8BAA8F;
      --text3: #4A6650;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.1rem 2.5rem;
      border-bottom: 0.5px solid var(--border);
      background: rgba(13,26,15,0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--lime); }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    .nav-links a {
      color: var(--text2);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--lime); font-weight: 500; }

    .btn-nav {
      background: var(--lime);
      color: var(--dark) !important;
      padding: 0.5rem 1.25rem;
      border-radius: 100px;
      font-weight: 500 !important;
      font-size: 0.875rem !important;
    }

    /* ── HERO ── */
    .page-hero {
      padding: 3rem 2.5rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .page-hero h1 em { font-style: italic; color: var(--lime); }

    .page-hero p {
      font-size: 0.95rem;
      color: var(--text2);
      font-weight: 300;
      margin-bottom: 1.5rem;
    }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    .filter-btn {
      background: var(--surface);
      border: 0.5px solid var(--border);
      color: var(--text2);
      padding: 0.45rem 1rem;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--muted); color: var(--text); }
    .filter-btn.active { background: var(--lime); color: var(--dark); border-color: var(--lime); font-weight: 500; }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .search-input {
      flex: 1;
      max-width: 320px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 100px;
      padding: 0.6rem 1.1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--lime); }
    .search-input::placeholder { color: var(--text3); }

    /* ── MAIN LAYOUT ── */
    .main-layout {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2.5rem 4rem;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 1.5rem;
      align-items: start;
    }

    /* ── MAP ── */
    .map-wrap {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      position: sticky;
      top: 80px;
    }

    #map {
      height: 600px;
      width: 100%;
    }

    /* Override Leaflet styles */
    .leaflet-container {
      background: #F8FAFC !important;
      font-family: 'DM Sans', sans-serif;
    }

    .leaflet-popup-content-wrapper {
      background: #ffffff !important;
      border: 0.5px solid #d1d5db !important;
      border-radius: 12px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4) !important;
      color: var(--text) !important;
    }

    .leaflet-popup-tip {
      background: #ffffff !important;
    }

    .leaflet-popup-close-button {
      color: #6b7280 !important;
    }
    
    .leaflet-popup-content-wrapper,
    .leaflet-popup-content {
      color: #111827 !important;
    }

    .popup-content h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .popup-content .popup-city {
      font-size: 0.75rem;
      color: var(--text2);
      margin-bottom: 8px;
    }

    .popup-content .popup-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .popup-tag {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 100px;
      background: #1A2E1D;
      color: var(--lime);
      font-weight: 500;
    }

    .popup-btn {
      display: block;
      background: var(--lime);
      color: var(--dark);
      text-align: center;
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      margin-top: 8px;
    }

    /* Custom marker */
    .custom-marker {
      width: 32px;
      height: 32px;
      background: var(--lime);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CLUB LIST ── */
    .clubs-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .clubs-count {
      font-size: 0.78rem;
      color: var(--text3);
      margin-bottom: 0.5rem;
    }

    .club-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .club-card:hover { border-color: var(--muted); transform: translateY(-1px); }
    .club-card.highlighted { border-color: var(--lime); background: #0F2014; }

    .club-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }

    .club-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    .club-premium {
      font-size: 0.6rem;
      background: rgba(191,239,69,0.15);
      color: var(--lime);
      padding: 2px 8px;
      border-radius: 100px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .club-city {
      font-size: 0.78rem;
      color: var(--text2);
      font-weight: 300;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .club-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .club-tag {
      font-size: 0.68rem;
      padding: 3px 9px;
      border-radius: 100px;
      background: #1A2E1D;
      color: var(--text2);
      border: 0.5px solid var(--border);
    }

    .club-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .club-credits {
      font-size: 0.78rem;
      color: var(--text2);
      font-weight: 300;
    }
    .club-credits strong { color: var(--lime); font-weight: 500; }

    .club-btn {
      background: transparent;
      border: 0.5px solid var(--muted);
      color: var(--text2);
      padding: 0.35rem 0.875rem;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .club-btn:hover { border-color: var(--lime); color: var(--lime); }

    /* ── AVAILABILITY ── */
    .availability-dots {
      display: flex;
      gap: 3px;
      align-items: center;
    }
    .avail-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .avail-dot.green { background: var(--lime); }
    .avail-dot.orange { background: #F59E0B; }
    .avail-dot.red { background: #EF4444; }
    .avail-dot.gray { background: var(--muted); }
    .avail-label { font-size: 0.72rem; color: var(--text2); margin-left: 4px; }

    /* ── MOBILE ── */
    @media (max-width: 900px) {
      .main-layout { grid-template-columns: 1fr; padding: 0 1.25rem 3rem; }
      .map-wrap { position: relative; top: 0; }
      #map { height: 350px; }
      .page-hero { padding: 2rem 1.25rem 1.5rem; }
      nav { padding: 1rem 1.25rem; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">Court<span>Pass</span></a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="clubs.html" class="active">Clubs</a>
    <a href="index.html#abonnementen">Abonnementen</a>
    <a href="login.html" style="border: 0.5px solid var(--muted); padding: 0.5rem 1.1rem; border-radius: 100px; font-size: 0.875rem;">Inloggen</a>
    <a href="login.html?tab=register" class="btn-nav">Probeer gratis</a>
  </div>
</nav>

<div class="page-hero">
  <h1>Tennisclubs in <em>Nederland</em></h1>
  <p>Ontdek alle aangesloten clubs en boek een baan bij jou in de buurt.</p>

  <div class="search-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍  Zoek op stad of clubnaam..." oninput="filterClubs()" />
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('alle', this)">Alle clubs</button>
    <button class="filter-btn" onclick="setFilter('amsterdam', this)">Amsterdam</button>
    <button class="filter-btn" onclick="setFilter('rotterdam', this)">Rotterdam</button>
    <button class="filter-btn" onclick="setFilter('utrecht', this)">Utrecht</button>
    <button class="filter-btn" onclick="setFilter('denhaag', this)">Den Haag</button>
    <button class="filter-btn" onclick="setFilter('premium', this)">⭐ Premium</button>
    <button class="filter-btn" onclick="setFilter('binnen', this)">🏠 Binnen</button>
    <button class="filter-btn" onclick="setFilter('buiten', this)">☀️ Buiten</button>
  </div>
</div>

<div class="main-layout">

  <!-- Club lijst -->
  <div>
    <div class="clubs-count" id="clubsCount">12 clubs gevonden</div>
    <div class="clubs-list" id="clubsList"></div>
  </div>

  <!-- Kaart -->
  <div class="map-wrap">
    <div id="map"></div>
  </div>

</div>

<script>
  // ── CLUB DATA ──
  const clubs = [
    {
      id: 1,
      name: 'Amsterdam Tennis Academy',
      city: 'Amsterdam',
      address: 'Rijksmuseumlaan 1, Amsterdam',
      lat: 52.3600, lng: 4.8852,
      tags: ['Binnen', 'Buiten', 'Coaching'],
      credits: 2,
      premium: true,
      available: 'green',
      banen: 8,
      filter: 'amsterdam'
    },
    {
      id: 2,
      name: 'Tennisclub Oost',
      city: 'Amsterdam',
      address: 'Linnaeusstraat 89, Amsterdam',
      lat: 52.3620, lng: 4.9290,
      tags: ['Buiten'],
      credits: 1,
      premium: false,
      available: 'green',
      banen: 4,
      filter: 'amsterdam'
    },
    {
      id: 3,
      name: 'Vondelpark Courts',
      city: 'Amsterdam',
      address: 'Vondelpark 3, Amsterdam',
      lat: 52.3580, lng: 4.8686,
      tags: ['Buiten', 'Publiek'],
      credits: 1,
      premium: false,
      available: 'orange',
      banen: 6,
      filter: 'amsterdam'
    },
    {
      id: 4,
      name: 'Noord Sportpark',
      city: 'Amsterdam',
      address: 'Buiksloterweg 12, Amsterdam Noord',
      lat: 52.3970, lng: 4.9130,
      tags: ['Binnen', 'Buiten'],
      credits: 1,
      premium: false,
      available: 'green',
      banen: 5,
      filter: 'amsterdam'
    },
    {
      id: 5,
      name: 'Rotterdam Tennis Club',
      city: 'Rotterdam',
      address: 'Kralingse Zoom 1, Rotterdam',
      lat: 51.9225, lng: 4.4792,
      tags: ['Binnen', 'Coaching'],
      credits: 2,
      premium: true,
      available: 'green',
      banen: 10,
      filter: 'rotterdam'
    },
    {
      id: 6,
      name: 'TC Zuid Rotterdam',
      city: 'Rotterdam',
      address: 'Zuiderpark 5, Rotterdam',
      lat: 51.8980, lng: 4.4650,
      tags: ['Buiten'],
      credits: 1,
      premium: false,
      available: 'orange',
      banen: 6,
      filter: 'rotterdam'
    },
    {
      id: 7,
      name: 'Utrecht Tennis Center',
      city: 'Utrecht',
      address: 'Galgenwaard 1, Utrecht',
      lat: 52.0705, lng: 5.1522,
      tags: ['Binnen', 'Buiten', 'Coaching'],
      credits: 2,
      premium: true,
      available: 'green',
      banen: 12,
      filter: 'utrecht'
    },
    {
      id: 8,
      name: 'Tennisvereniging Lunetten',
      city: 'Utrecht',
      address: 'Koningsweg 55, Utrecht',
      lat: 52.0580, lng: 5.1680,
      tags: ['Buiten'],
      credits: 1,
      premium: false,
      available: 'green',
      banen: 4,
      filter: 'utrecht'
    },
    {
      id: 9,
      name: 'Haagse TC',
      city: 'Den Haag',
      address: 'Zuiderpark 10, Den Haag',
      lat: 52.0550, lng: 4.2700,
      tags: ['Buiten', 'Coaching'],
      credits: 1,
      premium: false,
      available: 'red',
      banen: 8,
      filter: 'denhaag'
    },
    {
      id: 10,
      name: 'Tennis Den Haag Centrum',
      city: 'Den Haag',
      address: 'Malieveld 1, Den Haag',
      lat: 52.0820, lng: 4.3100,
      tags: ['Binnen'],
      credits: 2,
      premium: true,
      available: 'green',
      banen: 6,
      filter: 'denhaag'
    },
    {
      id: 11,
      name: 'Amstelveen TC',
      city: 'Amstelveen',
      address: 'Sportpark Middenhoven, Amstelveen',
      lat: 52.3010, lng: 4.8600,
      tags: ['Buiten'],
      credits: 1,
      premium: false,
      available: 'green',
      banen: 6,
      filter: 'amsterdam'
    },
    {
      id: 12,
      name: 'Eindhoven Tennis Club',
      city: 'Eindhoven',
      address: 'Sportpark Tongelreep, Eindhoven',
      lat: 51.4416, lng: 5.4697,
      tags: ['Binnen', 'Buiten'],
      credits: 1,
      premium: false,
      available: 'orange',
      banen: 8,
      filter: 'eindhoven'
    }
  ];

  let activeFilter = 'alle';
  let filteredClubs = [...clubs];
  let markers = {};
  let map;

  // ── INIT MAP ──
  function initMap() {
    map = L.map('map', {
      center: [52.3, 5.3],
      zoom: 7,
      zoomControl: true,
    });

    // Light tile layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO',
      maxZoom: 18,
    }).addTo(map);

    renderMarkers(clubs);
  }

  // ── CUSTOM MARKER ICON ──
  function createIcon(available, premium) {
    const color = premium ? '#BFEF45' : available === 'green' ? '#4ade80' : available === 'orange' ? '#F59E0B' : '#EF4444';
    return L.divIcon({
      html: `<div style="
        width: 14px;
        height: 14px;
        background: ${color};
        border-radius: 50%;
        border: 2.5px solid #0D1A0F;
        box-shadow: 0 0 0 3px ${color}33;
      "></div>`,
      className: '',
      iconSize: [14, 14],
      iconAnchor: [7, 7],
      popupAnchor: [0, -10],
    });
  }

  // ── RENDER MARKERS ──
  function renderMarkers(clubsToShow) {
    // Verwijder oude markers
    Object.values(markers).forEach(m => map.removeLayer(m));
    markers = {};

    clubsToShow.forEach(club => {
      const marker = L.marker([club.lat, club.lng], { icon: createIcon(club.available, club.premium) });

      const availText = club.available === 'green' ? '✅ Beschikbaar' : club.available === 'orange' ? '⚠️ Beperkt' : '❌ Vol';

      marker.bindPopup(`
        <div class="popup-content" style="min-width: 180px;">
          <h3>${club.name}</h3>
          <div class="popup-city">📍 ${club.city}</div>
          <div class="popup-tags">
            ${club.tags.map(t => `<span class="popup-tag">${t}</span>`).join('')}
            ${club.premium ? '<span class="popup-tag">⭐ Premium</span>' : ''}
          </div>
          <div style="font-size:0.75rem;color:#8BAA8F;margin-bottom:6px;">${availText} · ${club.banen} banen</div>
          <div style="font-size:0.75rem;color:#8BAA8F;margin-bottom:8px;">💳 <strong style="color:#BFEF45;">${club.credits} credit${club.credits > 1 ? 's' : ''}</strong> per sessie</div>
          <a href="#club-${club.id}" class="popup-btn" onclick="scrollToClub(${club.id})">Bekijk club</a>
        </div>
      `);

      marker.on('click', () => highlightClub(club.id));
      marker.addTo(map);
      markers[club.id] = marker;
    });
  }

  // ── RENDER CLUB CARDS ──
  function renderClubs(clubsToShow) {
    const list = document.getElementById('clubsList');
    document.getElementById('clubsCount').textContent = `${clubsToShow.length} club${clubsToShow.length !== 1 ? 's' : ''} gevonden`;

    if (clubsToShow.length === 0) {
      list.innerHTML = `
        <div style="text-align:center;padding:3rem 1rem;color:var(--text3);">
          <div style="font-size:2rem;margin-bottom:0.75rem;">🎾</div>
          <p style="font-size:0.875rem;">Geen clubs gevonden</p>
        </div>`;
      return;
    }

    list.innerHTML = clubsToShow.map(club => {
      const availColor = club.available === 'green' ? 'green' : club.available === 'orange' ? 'orange' : 'red';
      const availText = club.available === 'green' ? 'Beschikbaar' : club.available === 'orange' ? 'Beperkt' : 'Vol';

      return `
        <div class="club-card" id="club-${club.id}" onclick="highlightClub(${club.id})">
          <div class="club-card-header">
            <div class="club-name">${club.name}</div>
            ${club.premium ? '<span class="club-premium">⭐ Premium</span>' : ''}
          </div>
          <div class="club-city">📍 ${club.city} · ${club.address.split(',')[0]}</div>
          <div class="club-tags">
            ${club.tags.map(t => `<span class="club-tag">${t}</span>`).join('')}
          </div>
          <div class="club-footer">
            <div>
              <div class="availability-dots" style="margin-bottom:4px;">
                <div class="avail-dot ${availColor}"></div>
                <span class="avail-label">${availText} · ${club.banen} banen</span>
              </div>
              <div class="club-credits">💳 <strong>${club.credits} credit${club.credits > 1 ? 's' : ''}</strong> per sessie</div>
            </div>
            <a href="login.html" class="club-btn">Boek baan →</a>
          </div>
        </div>`;
    }).join('');
  }

  // ── FILTER ──
  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function filterClubs() {
    applyFilters();
  }

  function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase();

    filteredClubs = clubs.filter(club => {
      const matchesFilter =
        activeFilter === 'alle' ? true :
        activeFilter === 'premium' ? club.premium :
        activeFilter === 'binnen' ? club.tags.includes('Binnen') :
        activeFilter === 'buiten' ? club.tags.includes('Buiten') :
        club.filter === activeFilter;

      const matchesSearch =
        club.name.toLowerCase().includes(search) ||
        club.city.toLowerCase().includes(search);

      return matchesFilter && matchesSearch;
    });

    renderClubs(filteredClubs);
    renderMarkers(filteredClubs);

    // Zoom naar gefilterde clubs
    if (filteredClubs.length > 0) {
      const bounds = L.latLngBounds(filteredClubs.map(c => [c.lat, c.lng]));
      map.fitBounds(bounds, { padding: [40, 40] });
    }
  }

  // ── HIGHLIGHT ──
  function highlightClub(id) {
    // Reset alle cards
    document.querySelectorAll('.club-card').forEach(c => c.classList.remove('highlighted'));
    const card = document.getElementById(`club-${id}`);
    if (card) {
      card.classList.add('highlighted');
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    // Open marker popup
    if (markers[id]) {
      markers[id].openPopup();
      map.setView(markers[id].getLatLng(), 13, { animate: true });
    }
  }

  function scrollToClub(id) {
    highlightClub(id);
  }

  // ── START ──
  initMap();
  renderClubs(clubs);
</script>
</body>
</html>
